name: Generate Bonsais

on:
  workflow_dispatch:
  pull_request:
    types: [ opened ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
          server-id:
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.40"
          enable-modules-cache: false

      - name: Install Perl dependencies
        run: cpanm -n Mojolicious

      - name: Store old generated files
        run: cp -a generated/ old_generated/

      - name: Build with Gradle
        run: ./gradlew regeneratePacks

      - uses: int128/diff-action@v1
        with:
          base: old_generated
          head: generated
